name: polymarket-dashboard
region: nyc

databases:
  - name: polymarket-db
    engine: PG
    version: "16"
    production: true
    size: db-s-1vcpu-2gb

ingress:
  rules:
    - component:
        name: backend
      match:
        path:
          prefix: /api
    - component:
        name: backend
      match:
        path:
          prefix: /ws
    - component:
        name: backend
      match:
        path:
          prefix: /health
    - component:
        name: frontend
      match:
        path:
          prefix: /

services:
  - name: backend
    source_dir: backend
    dockerfile_path: backend/Dockerfile
    http_port: 8000
    instance_size_slug: basic-s
    instance_count: 1
    health_check:
      http_path: /health
      initial_delay_seconds: 20
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${polymarket-db.DATABASE_URL}
      - key: API_HOST
        value: "0.0.0.0"
        scope: RUN_TIME
      - key: API_PORT
        value: "8000"
        scope: RUN_TIME
      - key: CORS_ORIGINS
        value: "${APP_URL}"
        scope: RUN_TIME
      - key: GAMMA_BASE
        value: https://gamma-api.polymarket.com
        scope: RUN_TIME
      - key: CLOB_BASE
        value: https://clob.polymarket.com
        scope: RUN_TIME
      - key: REQUEST_TIMEOUT
        value: "30"
        scope: RUN_TIME
      - key: MAX_RETRIES
        value: "3"
        scope: RUN_TIME
      - key: RETRY_BACKOFF_SEC
        value: "2"
        scope: RUN_TIME
      - key: BASE_RATE
        value: "0.50"
        scope: RUN_TIME
      - key: DEFAULT_DEPTH
        value: "10"
        scope: RUN_TIME
      - key: DEFAULT_FIDELITY
        value: "60"
        scope: RUN_TIME
      - key: USE_UTC
        value: "true"
        scope: RUN_TIME

  - name: frontend
    source_dir: frontend
    dockerfile_path: frontend/Dockerfile
    http_port: 80
    instance_size_slug: basic-xxs
    instance_count: 1
    envs:
      - key: VITE_API_BASE_URL
        value: "${APP_URL}"
        scope: BUILD_TIME
      - key: VITE_WS_BASE_URL
        value: "${APP_URL}"
        scope: BUILD_TIME
